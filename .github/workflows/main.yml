name: Build libadrenotools
on: 
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Critical for fetching dependencies

      - name: Set up NDK
        uses: nntld/setup-ndk@v1
        with:
          ndk-version: r25c # Stable version for this library

      - name: Build with CMake
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload libadrenotools.so
        uses: actions/upload-artifact@v4
        with:
          name: libadrenotools-arm64
          path: build/libadrenotools.so
